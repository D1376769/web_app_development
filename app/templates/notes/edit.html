{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('notes.detail', id=note.id) }}" class="btn btn-sm btn-outline-secondary me-3"><i class="fa-solid fa-arrow-left"></i> 返回</a>
            <h2 class="fw-bold mb-0">編輯筆記</h2>
        </div>

        <div class="glass-card p-4 p-md-5">
            <form action="{{ url_for('notes.update_note', id=note.id) }}" method="POST">
                <div class="mb-4">
                    <label for="summary" class="form-label fw-bold">核心摘要 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="summary" name="summary" value="{{ note.summary }}" required>
                </div>
                
                <div class="mb-4">
                    <label for="extension" class="form-label fw-bold">延伸思考與細節</label>
                    <textarea class="form-control" id="extension" name="extension" rows="8">{{ note.extension }}</textarea>
                </div>
                
                <div class="mb-4">
                    <label for="tags" class="form-label fw-bold">標籤 (以逗號分隔)</label>
                    <input type="text" class="form-control" id="tags" name="tags" value="{{ tags_string }}">
                </div>
                
                <div class="mb-4 form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="is_weakspot" name="is_weakspot" value="1" {% if note.is_weakspot %}checked{% endif %}>
                    <label class="form-check-label text-warning" for="is_weakspot"><i class="fa-solid fa-fire mx-1"></i> 標記為盲點 / 錯題</label>
                </div>
                
                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-primary-custom btn-lg">更新儲存</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
